{% extends 'base.html' %}
{% load static %}

{% block content %}
<div id="layout-wrapper" class="flex min-h-screen bg-earth-50 dark:bg-earth-950 transition-colors duration-300 overflow-hidden hidden">
    <!-- Navigation Sidebar -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full bg-white dark:bg-earth-900 border-r border-earth-200 dark:border-earth-800 transition-all duration-300 z-50 w-64 md:block flex flex-col">
        <div class="p-6 flex items-center gap-3">
            <div class="w-10 h-10 bg-forest-600 rounded-xl flex items-center justify-center text-white text-xl">
                <ion-icon name="leaf-outline"></ion-icon>
            </div>
            <div id="sidebar-logo-text" class="font-serif font-bold text-xl text-forest-900 dark:text-forest-100 transition-opacity duration-300">
                BeTo's House
            </div>
        </div>

        <nav class="flex-1 px-3 space-y-1">
            <button data-view="dashboard" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-earth-600 hover:bg-forest-50 hover:text-forest-700 dark:text-earth-400 dark:hover:bg-forest-900/20 dark:hover:text-forest-300">
                <ion-icon name="grid-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Dashboard</span>
            </button>
            <button data-view="tasks" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-earth-600 hover:bg-forest-50 hover:text-forest-700 dark:text-earth-400 dark:hover:bg-forest-900/20 dark:hover:text-forest-300">
                <ion-icon name="checkbox-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Tarefas</span>
            </button>
            <button data-view="finance" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-earth-600 hover:bg-forest-50 hover:text-forest-700 dark:text-earth-400 dark:hover:bg-forest-900/20 dark:hover:text-forest-300">
                <ion-icon name="stats-chart-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Financeiro</span>
            </button>
            <button data-view="places" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-earth-600 hover:bg-forest-50 hover:text-forest-700 dark:text-earth-400 dark:hover:bg-forest-900/20 dark:hover:text-forest-300">
                <ion-icon name="location-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Passeios</span>
            </button>
            <button data-view="calendar" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-earth-600 hover:bg-forest-50 hover:text-forest-700 dark:text-earth-400 dark:hover:bg-forest-900/20 dark:hover:text-forest-300">
                <ion-icon name="calendar-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Calendário</span>
            </button>
            <button data-view="admin" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all font-medium text-earth-600 hover:bg-forest-50 hover:text-forest-700 dark:text-earth-400 dark:hover:bg-forest-900/20 dark:hover:text-forest-300">
                <ion-icon name="settings-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Admin</span>
            </button>
        </nav>

        <div class="p-4 mt-auto border-t border-earth-100 dark:border-earth-800">
            <button id="logout-btn" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-all font-medium">
                <ion-icon name="log-out-outline" class="text-xl"></ion-icon>
                <span class="nav-label">Sair</span>
            </button>
        </div>
    </aside>

    <!-- Main Content Area -->
    <main id="main-content" class="flex-1 p-4 md:p-8 overflow-y-auto h-screen no-scrollbar transition-all duration-300 ease-in-out ml-64 pb-24 md:pb-8">
        <header class="flex justify-between items-center mb-8 sticky top-0 bg-earth-50/90 dark:bg-earth-950/90 backdrop-blur-sm py-2 z-40">
            <div class="md:hidden text-forest-700 font-bold font-serif text-lg">BeTo's House</div>
            <div class="hidden md:block">
                <h2 id="view-title" class="text-xl font-bold capitalize text-earth-800 dark:text-earth-100">Dashboard</h2>
            </div>

            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full text-forest-600 dark:text-forest-300 hover:bg-forest-100 dark:hover:bg-forest-900 transition-colors">
                    <ion-icon name="moon-outline" id="theme-icon" class="text-xl"></ion-icon>
                </button>

                <button class="p-2 relative rounded-full text-forest-600 dark:text-forest-300 hover:bg-forest-100 dark:hover:bg-forest-900 transition-colors">
                    <ion-icon name="notifications-outline" class="text-xl"></ion-icon>
                    <span class="absolute top-1.5 right-2 w-2 h-2 bg-red-500 rounded-full"></span>
                </button>

                <div class="flex items-center gap-2 border-l pl-4 border-earth-300 dark:border-earth-700 group relative">
                    <button class="flex items-center gap-2 focus:outline-none">
                        <span id="user-name" class="text-sm font-medium text-earth-700 dark:text-earth-200">User</span>
                        <img id="user-avatar" src="" alt="Profile" class="w-8 h-8 rounded-full border border-forest-200">
                    </button>
                </div>
            </div>
        </header>

        <div id="view-container" class="animate-in fade-in duration-300">
            <!-- Content will be injected here -->
            <div class="flex items-center justify-center h-64">
                <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-forest-600"></div>
            </div>
        </div>
    </main>
</div>

<!-- Login Wrapper -->
<div id="login-wrapper" class="min-h-screen flex items-center justify-center bg-earth-50 dark:bg-earth-950 p-4">
    <!-- Login form will be injected here by UI.js -->
</div>
{% endblock %}
