{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeTo's House - Eco Home Manager</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        earth: {
                            50: '#f7f6f5',
                            100: '#edeae6',
                            200: '#d9d2cb',
                            300: '#bfb1a4',
                            400: '#a6907f',
                            500: '#8e725f',
                            600: '#755d4d',
                            700: '#614d41',
                            800: '#524138',
                            900: '#453831',
                            950: '#251d1a',
                        },
                        forest: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            300: '#86efac',
                            400: '#4ade80',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                            950: '#052e16',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Outfit', 'serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-earth-50 dark:bg-earth-950 text-earth-900 dark:text-earth-50 transition-colors duration-300">
    <div id="app-root">
        {% block content %}{% endblock %}
    </div>

    <!-- Ionicons for Lucide replacements (simplified for vanilla) -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- API Client -->
    <script src="{% static 'js/api.js' %}"></script>

    <!-- UI core (define o objeto `ui`) -->
    <script src="{% static 'js/ui.js' %}"></script>

    <!-- Views individuais (estendem `ui`) -->
    <script src="{% static 'js/views/login.js' %}"></script>
    <script src="{% static 'js/views/dashboard.js' %}"></script>
    <script src="{% static 'js/views/tasks.js' %}"></script>
    <script src="{% static 'js/views/finance.js' %}"></script>
    <script src="{% static 'js/views/places.js' %}"></script>
    <script src="{% static 'js/views/calendar.js' %}"></script>

    <!-- Controlador principal da aplicação -->
    <script src="{% static 'js/main.js' %}"></script>
</body>
</html>
